<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motonia — 3D Navigation & Live Riders</title>
  <meta name="description" content="Motonia is the sportbike app for real-time group rides, 3D navigation, and a live rider network. Free on iOS and Android." />
  <meta name="theme-color" content="#000000" />

  <!-- Open Graph / social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Motonia — 3D Navigation & Live Riders" />
  <meta property="og:description" content="Real-time group rides, 3D navigation, and a live rider network. Built for the ride." />
  <meta property="og:url" content="https://motonia.org/" />
  <meta property="og:image" content="https://motonia.org/assets/icon-512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta name="twitter:card" content="summary" />

  <link rel="icon" href="/assets/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/icon-512.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preload" href="/assets/fonts/sora.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/assets/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#cta">Skip to download</a>

  <main class="hero">
    <!-- ===================== BACKGROUND =====================
         Black for now. To use cinematic footage later, drop
         hero.mp4 (+ poster.jpg) into /assets and uncomment the
         <video> block below. The overlay keeps text legible. -->
    <div class="bg" aria-hidden="true">
      <video class="bg-video" autoplay muted loop playsinline preload="auto" poster="assets/poster.jpg">
        <source src="assets/hero.mp4" type="video/mp4" />
      </video>
      <div class="bg-overlay"></div>
    </div>

    <!-- ===================== CONTENT ===================== -->
    <div class="hero-content">
      <img class="logo" src="assets/motonia-logo.png" alt="Motonia logo" width="140" height="140" />

      <h1 class="wordmark">MOTONIA</h1>
      <p class="tagline">3D Navigation &amp; Live Riders</p>

      <p class="subtag">
        Real-time group rides, 3D navigation, and a live rider network — built for the ride.
      </p>

      <div class="store-buttons" id="cta">
        <a class="store-btn" href="https://apps.apple.com/us/app/motonia/id6760694800" aria-label="Download Motonia on the App Store" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true" fill="currentColor">
            <path d="M16.365 1.43c0 1.14-.42 2.2-1.12 2.99-.84.95-2.22 1.69-3.39 1.6-.14-1.12.42-2.31 1.07-3.05.74-.85 2.06-1.5 3.16-1.54.03 0 0 0 .28 0zM20.94 17.06c-.55 1.27-.82 1.84-1.53 2.96-.99 1.57-2.39 3.52-4.12 3.53-1.54.02-1.93-1-4.02-.99-2.09.01-2.52 1.01-4.06.99-1.73-.01-3.05-1.78-4.04-3.34C-.62 16.06-.9 10.43 1.36 7.41c.95-1.34 2.45-2.18 4.05-2.18 1.63 0 2.66 1.06 4.01 1.06 1.31 0 2.11-1.06 4-1.06 1.43 0 2.94.78 4.02 2.13-3.53 1.93-2.96 6.96.5 7.7z"/>
          </svg>
          <span class="store-btn-text">
            <small>Download on the</small>
            <strong>App Store</strong>
          </span>
        </a>

        <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.motonia.android" aria-label="Get Motonia on Google Play" target="_blank" rel="noopener">
          <svg viewBox="0 0 512 512" width="24" height="24" aria-hidden="true">
            <path d="M48 59.4C45 62.6 43 67.6 43 74.4V437.6c0 6.8 2 11.8 5 15l1.9 1.8L253.3 250.2v-4.4L49.9 57.6 48 59.4z" fill="#34C3D8"/>
            <path d="M325.3 318.2L253.3 246v-4.4l72-72.1 1.6.9 85.4 48.5c24.4 13.8 24.4 36.5 0 50.4l-85.4 48.5-1.6.4z" fill="#7FD157"/>
            <path d="M326.9 317.8L253.3 245.8 48 451c8 8.5 21.4 9.5 36.4 1L326.9 317.8z" fill="#5FB14A"/>
            <path d="M326.9 173.8L84.4 36.6C69.4 28.1 56 29.1 48 37.6l205.3 208.2 73.6-72z" fill="#21A7D2"/>
          </svg>
          <span class="store-btn-text">
            <small>GET IT ON</small>
            <strong>Google Play</strong>
          </span>
        </a>
      </div>

      <p class="microcopy">Free on iOS &amp; Android</p>
    </div>
  </main>

  <footer class="footer">
    © <span id="year">2026</span> Morobo LLC
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Respect reduced-motion: keep the poster frame instead of autoplaying.
    (function () {
      var v = document.querySelector('.bg-video');
      if (!v) return;
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) {
        v.removeAttribute('autoplay');
        v.pause();
      } else {
        var p = v.play();
        if (p && p.catch) p.catch(function () {}); // ignore autoplay-block; poster shows
      }
    })();
  </script>
</body>
</html>
